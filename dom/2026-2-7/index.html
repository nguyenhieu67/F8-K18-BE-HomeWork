<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Homework exercise 32</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <header id="header" class="header"></header>
        <main>
            <div class="container">
                <!-- Task 1 -->
                <div id="task 1" class="task">
                    <p class="title">Task 1: Add a paragraph.</p>

                    <div class="content-1">
                        <button class="btn">Add paragraph</button>
                    </div>
                </div>
                <!-- Task 2 -->
                <div id="task 2" class="task">
                    <p class="title">Task 2: Add item.</p>
                    <div class="content-2">
                        <button class="btn">Add item</button>
                        <ul></ul>
                    </div>
                </div>
                <!-- Task 3 -->
                <div id="task 3" class="task">
                    <p class="title">Task 3: Print what you input.</p>
                    <div class="content-3">
                        <input placeholder="Enter input..." />
                        <button class="btn">Add</button>
                    </div>
                </div>
                <!-- Task 4 -->
                <div id="task 4" class="task">
                    <p class="title">Task 4: Todo mini.</p>
                    <div class="content-4">
                        <input placeholder="Enter input..." />
                        <button class="btn">Add</button>
                        <ul></ul>
                    </div>
                </div>
                <!-- Task 5 -->
                <div id="task 5" class="task">
                    <p class="title">Task 5: Click to change color.</p>
                    <div class="content-5">
                        <button class="btn">Add item</button>
                        <ul></ul>
                    </div>
                </div>
                <!-- Task 6 -->
                <div id="task 6" class="task">
                    <p class="title">Task 6: Delete item.</p>
                    <div class="content-6">
                        <button class="btn">Add item</button>
                        <ul></ul>
                    </div>
                </div>
                <!-- Task 7 -->
                <div id="task 7" class="task">
                    <p class="title">Task 7: Todo has a state</p>
                    <div class="content-7">
                        <input
                            placeholder="Enter input..."
                            style="display: inline-block"
                        />
                        <button class="btn">Add</button>
                        <ul></ul>
                    </div>
                </div>
                <!-- Task 8 -->
                <div id="task 8" class="task">
                    <p class="title">Task 8: Selected list.</p>
                    <div class="content-8">
                        <button class="btn">Add item</button>
                        <ul></ul>
                    </div>
                </div>
                <!-- Task 9 -->
                <div id="task 9" class="task" style="width: 70%">
                    <p class="title">Task 9: Todo app</p>
                    <div class="content-9">
                        <div>
                            <input placeholder="Enter input..." />
                            <button class="btn">Add</button>
                        </div>
                        <ul></ul>

                        <!-- Search -->
                        <div class="wrap-search">
                            <div class="search">
                                <input
                                    type="text"
                                    placeholder="Search tasks..."
                                />
                            </div>

                            <div class="checkbox">
                                <label for="checkbox">Done</label>
                                <input
                                    type="checkbox"
                                    name="checkbox"
                                    id="checkbox"
                                />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <script type="module" src="./js/index.js"></script>
    </body>
</html>
